<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NetForge — نت‌فورج</title>
    <meta name="description" content="نت‌فورج — فضای خصوصی دانشجویی، فقط با دعوت" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png" />
    <link rel="apple-touch-icon" href="./icons/icon-180.png" />
    <!-- PWA: نصب سایت رو صفحه‌ی اصلی گوشی/کامپیوتر + باز شدن بدون نوار مرورگر -->
    <link rel="manifest" href="./manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NetForge" />
    <script>
      // ثبت سرویس‌ورکر (قابل‌نصب شدن + کش هوشمند)
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('./sw.js', { scope: './' }).catch(function () {})
        })
      }
    </script>
    <!-- آیکون‌پک Font Awesome (به‌جای ایموجی‌ها در کل رابط کاربری) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
      // اعمال فوری حالت روز/شب و زبان «قبل» از رندر صفحه، تا سایت چشمک نزند.
      // nf_mode : دکمه‌ی خورشید/ماه توی نوار کناری  ·  nf_lang : دکمه‌ی زبان (fa/en)
      try {
        if (localStorage.getItem('nf_mode') === 'light') {
          document.documentElement.dataset.themeMode = 'light'
        }
        var nfLang = localStorage.getItem('nf_lang') === 'en' ? 'en' : 'fa'
        document.documentElement.lang = nfLang
        document.documentElement.dir = nfLang === 'en' ? 'ltr' : 'rtl'
      } catch (e) { /* localStorage در دسترس نیست */ }
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
